<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Monocle with circuit accent -->
  <circle cx="50" cy="45" r="25" fill="none" stroke="#1a1a2e" stroke-width="4"/>
  <circle cx="50" cy="45" r="20" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
  <!-- Chain -->
  <path d="M 72 55 Q 85 70 75 85" fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>
  <!-- Circuit lines inside monocle -->
  <line x1="37" y1="45" x2="45" y2="45" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="55" y1="45" x2="63" y2="45" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="50" y1="32" x2="50" y2="40" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="50" y1="50" x2="50" y2="58" stroke="#d4a574" stroke-width="1.5"/>
  <circle cx="50" cy="45" r="3" fill="#d4a574"/>
  <!-- Crosshair dots -->
  <circle cx="37" cy="45" r="1.5" fill="#d4a574"/>
  <circle cx="63" cy="45" r="1.5" fill="#d4a574"/>
  <circle cx="50" cy="32" r="1.5" fill="#d4a574"/>
  <circle cx="50" cy="58" r="1.5" fill="#d4a574"/>
</svg>
