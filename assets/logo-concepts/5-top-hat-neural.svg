<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Minimal top hat -->
  <rect x="30" y="30" width="40" height="35" rx="3" fill="#1a1a2e"/>
  <rect x="20" y="65" width="60" height="8" rx="4" fill="#1a1a2e"/>
  <!-- Hat band -->
  <rect x="30" y="55" width="40" height="5" fill="#d4a574"/>
  <!-- Neural dot pattern on hat -->
  <circle cx="40" cy="40" r="2" fill="#d4a574" opacity="0.7"/>
  <circle cx="50" cy="45" r="2" fill="#d4a574" opacity="0.7"/>
  <circle cx="60" cy="40" r="2" fill="#d4a574" opacity="0.7"/>
  <line x1="40" y1="40" x2="50" y2="45" stroke="#d4a574" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="45" x2="60" y2="40" stroke="#d4a574" stroke-width="0.8" opacity="0.5"/>
</svg>
