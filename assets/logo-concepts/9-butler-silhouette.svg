<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Abstract butler silhouette - head + shoulders + bow tie -->
  <!-- Head -->
  <circle cx="50" cy="28" r="14" fill="#1a1a2e"/>
  <!-- Shoulders -->
  <path d="M 20 75 Q 20 50 35 45 L 50 42 L 65 45 Q 80 50 80 75" fill="#1a1a2e"/>
  <!-- Bow tie -->
  <polygon points="50,48 40,43 40,53" fill="#d4a574"/>
  <polygon points="50,48 60,43 60,53" fill="#d4a574"/>
  <circle cx="50" cy="48" r="2.5" fill="#1a1a2e"/>
  <!-- Lapel lines -->
  <line x1="45" y1="55" x2="40" y2="75" stroke="#d4a574" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="55" x2="60" y2="75" stroke="#d4a574" stroke-width="1" opacity="0.5"/>
</svg>
