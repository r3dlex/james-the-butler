<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- James the Butler — The Whisper Logo (light version for dark backgrounds) -->
  <!-- Speech bubble -->
  <path d="M22 20 Q22 12 32 12 L68 12 Q78 12 78 22 L78 52 Q78 62 68 62 L42 62 L30 76 L32 62 L32 62 Q22 62 22 52 Z" fill="#ffffff"/>
  <!-- Prompt cursor -->
  <rect x="32" y="30" width="3" height="18" rx="1" fill="#d4a574"/>
  <!-- Text lines -->
  <rect x="40" y="30" width="22" height="3" rx="1.5" fill="#d4a574" opacity="0.6"/>
  <rect x="40" y="37" width="16" height="3" rx="1.5" fill="#d4a574" opacity="0.4"/>
  <rect x="40" y="44" width="28" height="3" rx="1.5" fill="#d4a574" opacity="0.3"/>
  <!-- Typing indicator -->
  <circle cx="56" cy="56" r="2" fill="#d4a574" opacity="0.5"/>
  <circle cx="63" cy="56" r="2" fill="#d4a574" opacity="0.35"/>
  <circle cx="70" cy="56" r="2" fill="#d4a574" opacity="0.2"/>
  <!-- Bow tie accent -->
  <polygon points="78,12 84,8 84,16" fill="#d4a574"/>
  <polygon points="78,12 72,8 72,16" fill="none" stroke="#d4a574" stroke-width="1"/>
</svg>
