name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  archgate:
    name: Architecture Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pipeline_runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: tools/pipeline_runner/poetry.lock

      - name: Install dependencies
        run: poetry install

      - name: Run architecture gate
        run: poetry run pipeline-runner archgate

  pipeline-lint:
    name: Pipeline Runner Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pipeline_runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: tools/pipeline_runner/poetry.lock

      - name: Install dependencies
        run: poetry install

      - name: Ruff check
        run: poetry run ruff check .

      - name: Ruff format
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy src/

  pipeline-test:
    name: Pipeline Runner Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pipeline_runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: tools/pipeline_runner/poetry.lock

      - name: Install dependencies
        run: poetry install

      - name: Run tests with coverage
        run: poetry run pytest --cov=pipeline_runner --cov-report=term-missing

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: james_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: backend/deps
          key: mix-${{ hashFiles('backend/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Check formatting
        run: mix format --check-formatted

      - name: Setup database
        run: mix ecto.create && mix ecto.migrate
        env:
          MIX_ENV: test
          DB_PORT: 5432

      - name: Run tests
        run: mix test --cover || (echo "::error::mix test --cover failed — see output above" && exit 1)
        env:
          MIX_ENV: test
          DB_PORT: 5432

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  cli-test:
    name: CLI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: cli/deps
          key: mix-cli-${{ hashFiles('cli/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Run tests with coverage
        run: mix test --cover

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

  mobile-test:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Test
        run: flutter test
